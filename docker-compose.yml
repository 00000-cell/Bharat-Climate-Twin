services:
  db:
    image: postgis/postgis:16-3.4
    container_name: bharat-climate-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bharat_climate}
      POSTGRES_USER: ${POSTGRES_USER:-climate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-climate} -d ${POSTGRES_DB:-bharat_climate}"]
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ./backend
    container_name: bharat-climate-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://climate:climate@db:5432/bharat_climate}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-long-random-secret}
      SEED_DATABASE: ${SEED_DATABASE:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    container_name: bharat-climate-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
